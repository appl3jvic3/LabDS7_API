<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos - API Fetch</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- CSS propio -->
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body class="bg-dark">
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h2 class="text-center">Gestión de Productos</h2>
        </div>
        <div class="card-body">
            <!-- Formulario de login (para obtener token) -->
            <div id="loginSection" class="mb-4 p-3 border rounded">
                <h4>Iniciar sesión</h4>
                <div class="row">
                    <div class="col-md-4">
                        <input type="text" id="username" class="form-control" placeholder="Usuario (admin)">
                    </div>
                    <div class="col-md-4">
                        <input type="password" id="password" class="form-control" placeholder="Contraseña">
                    </div>
                    <div class="col-md-4">
                        <button id="btnLogin" class="btn btn-success w-100">Obtener Token</button>
                    </div>
                </div>
                <div id="tokenInfo" class="mt-2 small text-muted"></div>
            </div>

            <!-- Formulario de productos (solo visible después del login) -->
            <div id="productosSection" style="display: none;">
                <form id="productoForm">
                    <input type="hidden" id="productoId" value="">
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label>Código</label>
                            <input type="text" id="codigo" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label>Producto</label>
                            <input type="text" id="producto" class="form-control" required>
                        </div>
                        <div class="col-md-2">
                            <label>Precio</label>
                            <input type="number" step="0.01" id="precio" class="form-control" required>
                        </div>
                        <div class="col-md-2">
                            <label>Cantidad</label>
                            <input type="number" id="cantidad" class="form-control" min="1" required>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">Guardar</button>
                        </div>
                    </div>
                </form>
                <div class="row mb-3">
                    <div class="col-md-8">
                        <input type="text" id="searchInput" class="form-control" placeholder="Buscar por código o nombre">
                    </div>
                    <div class="col-md-4">
                        <button id="btnBuscar" class="btn btn-secondary w-100">Buscar</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr><th>ID</th><th>Código</th><th>Producto</th><th>Precio</th><th>Cantidad</th><th>Acciones</th></tr>
                        </thead>
                        <tbody id="productosTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
